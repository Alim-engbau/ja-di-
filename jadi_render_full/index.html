<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Суши ja di</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .active-category {
      background: #dc2626;
      color: white;
    }

    .cart-modal {
      display: none;
    }

    .cart-modal.show {
      display: flex;
    }
  </style>
</head>

<body class="bg-zinc-950 text-white">

  <!-- HEADER -->
  <header class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="px-6 md:px-10 py-4 flex flex-col md:flex-row gap-4 justify-between items-center">

      <h1 onclick="showCategories()" class="text-3xl font-bold cursor-pointer">
        <span class="text-red-500">Суши</span> ja di
      </h1>

      <div class="flex items-center gap-4 w-full md:w-auto">

        <input
          type="text"
          id="searchInput"
          placeholder="Поиск блюда..."
          class="bg-zinc-900 px-4 py-2 rounded-xl outline-none w-full md:w-72"
        />

        <button onclick="openCart()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-xl whitespace-nowrap">
          🛒 Корзина <span id="cart-count">0</span>
        </button>

      </div>

    </div>
  </header>

  <!-- MAIN -->
  <div class="flex flex-col md:flex-row gap-6 p-6 md:p-10">

    <!-- SIDEBAR -->
    <aside class="w-full md:w-64 bg-zinc-900 rounded-2xl p-5 h-fit">

      <h2 class="text-red-500 text-xl font-bold mb-4">
        МЕНЮ
      </h2>

      <div class="space-y-2">

        <button class="category-btn active-category w-full text-left p-3 rounded-xl hover:bg-red-700" data-category="home">
          Главная
        </button>

        <button class="category-btn w-full text-left p-3 rounded-xl hover:bg-zinc-800" data-category="rolls">
          Роллы
        </button>

        <button class="category-btn w-full text-left p-3 rounded-xl hover:bg-zinc-800" data-category="fastfood">
          Фастфуд
        </button>

        <button class="category-btn w-full text-left p-3 rounded-xl hover:bg-zinc-800" data-category="pizza">
          Пицца
        </button>

        <button class="category-btn w-full text-left p-3 rounded-xl hover:bg-zinc-800" data-category="drinks">
          Напитки
        </button>

      </div>

    </aside>

    <main class="flex-1">

      <div class="mb-6">
        <button
          id="backButton"
          onclick="showCategories()"
          class="hidden mb-4 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl"
        >
          ← Назад к категориям
        </button>

        <h2 id="pageTitle" class="text-2xl font-bold">Категории меню</h2>

      </div>

      <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

    </main>

  </div>

  <div id="cartModal" class="cart-modal fixed inset-0 bg-black/70 z-50 items-center justify-center p-4">

    <div class="bg-zinc-900 rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto border border-zinc-700">

      <div class="flex justify-between items-center p-5 border-b border-zinc-700">
        <h2 class="text-2xl font-bold">Корзина</h2>
        <button onclick="closeCart()" class="text-zinc-400 hover:text-white text-2xl">
          ✕
        </button>
      </div>

      <div class="p-5">

        <div id="cart-items" class="space-y-4 mb-6"></div>

        <div class="bg-zinc-950 rounded-xl p-4 mb-6">
          <div class="flex justify-between text-xl font-bold">
            <span>Итого:</span>
            <span class="text-red-500" id="cart-total">0 ₸</span>
          </div>
        </div>

        <h3 class="text-xl font-bold mb-4">Данные для заказа</h3>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5">
          <input
            id="customerName"
            type="text"
            placeholder="Ваше имя"
            class="bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-xl outline-none"
          />

          <input
            id="customerPhone"
            type="text"
            placeholder="Телефон"
            class="bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-xl outline-none"
          />

          <input
            id="customerAddress"
            type="text"
            placeholder="Адрес"
            class="bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-xl outline-none"
          />
        </div>

        <button onclick="submitOrder()" class="w-full bg-red-600 hover:bg-red-700 py-3 rounded-xl font-bold">
          Оформить заказ
        </button>

      </div>

    </div>

  </div>

  <script>
    const API_URL = "";

    const menuCategories = [
      {
        key: "rolls",
        title: "Роллы",
        description: "Классические, запечённые и фирменные роллы.",
        image: "https://images.unsplash.com/photo-1579584425555-c3ce17fd4351?q=80&w=1200"
      },
      {
        key: "fastfood",
        title: "Фастфуд",
        description: "Картофель фри, наггетсы, бургеры и закуски.",
        image: "https://images.unsplash.com/photo-1576107232684-1279f390859f?q=80&w=1200"
      },
      {
        key: "pizza",
        title: "Пицца",
        description: "Горячая пицца с разными начинками.",
        image: "https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1200"
      },
      {
        key: "drinks",
        title: "Напитки",
        description: "Газированные напитки, соки и морсы.",
        image: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?q=80&w=1200"
      }
    ];

    const categoryNames = {
      rolls: "Роллы",
      fastfood: "Фастфуд",
      pizza: "Пицца",
      drinks: "Напитки"
    };

    let products = [];
    let currentCategory = "home";

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const grid = document.getElementById("products-grid");
    const searchInput = document.getElementById("searchInput");
    const pageTitle = document.getElementById("pageTitle");
    const pageDescription = document.getElementById("pageDescription");
    const backButton = document.getElementById("backButton");


    async function loadProducts() {
      try {
        grid.innerHTML = `
          <div class="text-zinc-400">
            Загрузка меню...
          </div>
        `;

        const response = await fetch(`${API_URL}/products`);

        if (!response.ok) {
          throw new Error("Ошибка загрузки товаров");
        }

        products = await response.json();

        showCategories();
        updateCartCount();

      } catch (error) {
        console.error(error);

        grid.innerHTML = `
          <div class="text-red-500">
            Не удалось загрузить меню. Проверь, запущен ли сервер Node.js.
          </div>
        `;
      }
    }

    // =========================
    // SHOW ONLY 4 CATEGORY CARDS
    // =========================
    window.showCategories = function () {
      currentCategory = "home";
      searchInput.value = "";

      setActiveSidebar("home");

      pageTitle.innerText = "Категории меню";
      backButton.classList.add("hidden");

      grid.innerHTML = "";

      menuCategories.forEach(category => {
        const card = document.createElement("div");

        card.className = "card bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800 cursor-pointer";
        card.onclick = () => showCategoryProducts(category.key);

        const count = products.filter(product => product.category === category.key).length;

        card.innerHTML = `
          <img
            src="${category.image}"
            class="w-full h-52 object-cover"
            alt="${category.title}"
          >

          <div class="p-5">
            <h3 class="text-2xl font-bold">
              ${category.title}
            </h3>

            <p class="text-zinc-400 mt-2 min-h-[48px]">
              ${category.description}
            </p>

            <div class="flex justify-between items-center mt-5">
              <span class="text-red-500 font-bold">
                ${count} товаров
              </span>

              <button class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-xl">
                Открыть
              </button>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });
    };

    // =========================
    // SHOW PRODUCTS INSIDE CATEGORY
    // =========================
    window.showCategoryProducts = function (categoryKey) {
      currentCategory = categoryKey;
      searchInput.value = "";

      setActiveSidebar(categoryKey);

      pageTitle.innerText = categoryNames[categoryKey] || "Товары";
      pageDescription.innerText = "Выберите блюда и добавьте их в корзину.";
      backButton.classList.remove("hidden");

      const filtered = products.filter(product => product.category === categoryKey);

      renderProducts(filtered);
    };

    // =========================
    // SET ACTIVE SIDEBAR BUTTON
    // =========================
    function setActiveSidebar(categoryKey) {
      document.querySelectorAll(".category-btn").forEach(btn => {
        btn.classList.remove("active-category");
        btn.classList.add("hover:bg-zinc-800");

        if (btn.dataset.category === categoryKey) {
          btn.classList.add("active-category");
          btn.classList.remove("hover:bg-zinc-800");
        }
      });
    }

    // =========================
    // RENDER PRODUCTS
    // =========================
    function renderProducts(list) {
      grid.innerHTML = "";

      if (!list.length) {
        grid.innerHTML = `
          <p class="text-zinc-400">
            В этой категории пока нет товаров
          </p>
        `;
        return;
      }

      list.forEach(product => {
        const card = document.createElement("div");

        card.className = "card bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800";

        card.innerHTML = `
          <img
            src="${product.img || "https://images.unsplash.com/photo-1579584425555-c3ce17fd4351?q=80&w=800"}"
            class="w-full h-48 object-cover"
            alt="${product.name}"
          >

          <div class="p-4">
            <p class="text-red-500 text-sm mb-2">
              ${categoryNames[product.category] || product.category || "Без категории"}
            </p>

            <h3 class="text-xl font-bold">
              ${product.name}
            </h3>

            <p class="text-zinc-400 mt-2 min-h-[48px]">
              ${product.description || "Описание блюда будет добавлено позже."}
            </p>

            <div class="flex justify-between items-center mt-4">
              <span class="text-red-500 text-lg font-bold">
                ${product.price} ₸
              </span>

              <button
                class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-xl add-btn"
                data-id="${product._id}"
              >
                Добавить
              </button>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });

      bindAddButtons();
    }

    // =========================
    // ADD BUTTONS
    // =========================
    function bindAddButtons() {
      document.querySelectorAll(".add-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id;
          const product = products.find(p => p._id === id);

          if (!product) return;

          const existingItem = cart.find(item => item.productId === product._id);

          if (existingItem) {
            existingItem.quantity += 1;
          } else {
            cart.push({
              productId: product._id,
              name: product.name,
              category: product.category,
              price: Number(product.price),
              quantity: 1
            });
          }

          saveCart();
          updateCartCount();
        });
      });
    }

    // =========================
    // SAVE CART
    // =========================
    function saveCart() {
      localStorage.setItem("cart", JSON.stringify(cart));
    }

    // =========================
    // UPDATE CART COUNT
    // =========================
    function updateCartCount() {
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById("cart-count").innerText = count;
    }

    // =========================
    // OPEN CART
    // =========================
    window.openCart = function () {
      renderCart();
      document.getElementById("cartModal").classList.add("show");
    };

    // =========================
    // CLOSE CART
    // =========================
    window.closeCart = function () {
      document.getElementById("cartModal").classList.remove("show");
    };

    // =========================
    // RENDER CART
    // =========================
    function renderCart() {
      const cartItems = document.getElementById("cart-items");
      const cartTotal = document.getElementById("cart-total");

      cartItems.innerHTML = "";

      if (!cart.length) {
        cartItems.innerHTML = `
          <p class="text-zinc-400">
            Корзина пустая
          </p>
        `;

        cartTotal.innerText = "0 ₸";
        return;
      }

      let total = 0;

      cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;

        const div = document.createElement("div");
        div.className = "flex flex-col md:flex-row md:items-center justify-between gap-4 bg-zinc-950 rounded-xl p-4 border border-zinc-800";

        div.innerHTML = `
          <div>
            <h4 class="font-bold">${item.name}</h4>
            <p class="text-zinc-400">${item.price} ₸ за 1 шт.</p>
          </div>

          <div class="flex items-center gap-3">
            <button onclick="changeQuantity('${item.productId}', -1)" class="bg-zinc-800 px-3 py-1 rounded-lg">−</button>
            <span>${item.quantity}</span>
            <button onclick="changeQuantity('${item.productId}', 1)" class="bg-zinc-800 px-3 py-1 rounded-lg">+</button>
          </div>

          <div class="font-bold text-red-500">
            ${itemTotal} ₸
          </div>

          <button onclick="removeFromCart('${item.productId}')" class="text-zinc-400 hover:text-red-500">
            Удалить
          </button>
        `;

        cartItems.appendChild(div);
      });

      cartTotal.innerText = `${total} ₸`;
    }

    // =========================
    // CHANGE QUANTITY
    // =========================
    window.changeQuantity = function (productId, value) {
      const item = cart.find(item => item.productId === productId);

      if (!item) return;

      item.quantity += value;

      if (item.quantity <= 0) {
        cart = cart.filter(item => item.productId !== productId);
      }

      saveCart();
      updateCartCount();
      renderCart();
    };

    // =========================
    // REMOVE FROM CART
    // =========================
    window.removeFromCart = function (productId) {
      cart = cart.filter(item => item.productId !== productId);

      saveCart();
      updateCartCount();
      renderCart();
    };

    // =========================
    // SUBMIT ORDER TO MONGODB
    // =========================
    window.submitOrder = async function () {
      if (!cart.length) {
        alert("Корзина пустая");
        return;
      }

      const name = document.getElementById("customerName").value.trim();
      const phone = document.getElementById("customerPhone").value.trim();
      const address = document.getElementById("customerAddress").value.trim();

      if (!name || !phone || !address) {
        alert("Заполните имя, телефон и адрес");
        return;
      }

      try {
        const response = await fetch(`${API_URL}/orders`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            customer: {
              name,
              phone,
              address
            },
            items: cart
          })
        });

        if (!response.ok) {
          throw new Error("Ошибка отправки заказа");
        }

        const result = await response.json();

        alert("Заказ успешно отправлен!");

        cart = [];
        saveCart();
        updateCartCount();
        renderCart();

        document.getElementById("customerName").value = "";
        document.getElementById("customerPhone").value = "";
        document.getElementById("customerAddress").value = "";

        closeCart();

        console.log("Заказ сохранён:", result);

      } catch (error) {
        console.error(error);
        alert("Не удалось отправить заказ. Проверь сервер.");
      }
    };

    // =========================
    // SEARCH
    // =========================
    searchInput.addEventListener("input", () => {
      const searchValue = searchInput.value.toLowerCase().trim();

      if (!searchValue) {
        if (currentCategory === "home") {
          showCategories();
        } else {
          showCategoryProducts(currentCategory);
        }
        return;
      }

      pageTitle.innerText = "Результаты поиска";
      pageDescription.innerText = "Найдены блюда по вашему запросу.";
      backButton.classList.remove("hidden");

      const filtered = products.filter(product =>
        product.name.toLowerCase().includes(searchValue) ||
        (product.description || "").toLowerCase().includes(searchValue)
      );

      renderProducts(filtered);
    });

    // =========================
    // SIDEBAR CATEGORY FILTER
    // =========================
    document.querySelectorAll(".category-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const category = btn.dataset.category;

        if (category === "home") {
          showCategories();
          return;
        }

        showCategoryProducts(category);
      });
    });

    // =========================
    // INIT
    // =========================
    loadProducts();
  </script>

</body>
</html>
