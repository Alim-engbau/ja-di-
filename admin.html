<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JA DI Admin</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>

<body class="bg-zinc-950 text-white">

  <header class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="px-6 md:px-10 py-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <div>
        <h1 class="text-3xl font-bold">
          <span class="text-red-500">JA</span>DI Admin
        </h1>
        <p class="text-zinc-400 mt-1">
          Управление товарами и заказами ресторана
        </p>
      </div>

      <button onclick="loadAll()" class="bg-red-600 hover:bg-red-700 px-5 py-2 rounded-xl">
        Обновить данные
      </button>
    </div>
  </header>

  <main class="p-6 md:p-10">

    <section class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 mb-8">
      <h2 class="text-2xl font-bold mb-5">
        Добавить товар
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">

        <input
          id="productName"
          type="text"
          placeholder="Название товара"
          class="bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-xl outline-none"
        />

        <select
          id="productCategory"
          class="bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-xl outline-none"
        >
          <option value="rolls">Роллы</option>
          <option value="fastfood">Фастфуд</option>
          <option value="pizza">Пицца</option>
          <option value="drinks">Напитки</option>
        </select>

        <input
          id="productPrice"
          type="number"
          placeholder="Цена"
          class="bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-xl outline-none"
        />

        <input
          id="productImg"
          type="text"
          placeholder="Ссылка на фото"
          class="bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-xl outline-none"
        />

        <button onclick="addProduct()" class="bg-red-600 hover:bg-red-700 px-4 py-3 rounded-xl font-bold">
          Добавить
        </button>

      </div>

      <textarea
        id="productDescription"
        placeholder="Описание / состав товара"
        class="bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-xl outline-none w-full mt-4 min-h-[100px]"
      ></textarea>

      <p class="text-zinc-500 mt-3 text-sm">
        Совет: для диплома важно заполнять описание товара, чтобы карточки выглядели полноценными.
      </p>
    </section>

    <section class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 mb-8">
      <div class="flex flex-col md:flex-row justify-between gap-4 mb-5">
        <div>
          <h2 class="text-2xl font-bold">
            Список товаров
          </h2>
          <p class="text-zinc-400">
            Здесь отображаются товары из базы данных MongoDB.
          </p>
        </div>

        <select
          id="filterCategory"
          onchange="renderProducts()"
          class="bg-zinc-950 border border-zinc-700 px-4 py-3 rounded-xl outline-none"
        >
          <option value="all">Все категории</option>
          <option value="rolls">Роллы</option>
          <option value="fastfood">Фастфуд</option>
          <option value="pizza">Пицца</option>
          <option value="drinks">Напитки</option>
        </select>
      </div>

      <div id="productsList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5"></div>
    </section>

    <section class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
      <h2 class="text-2xl font-bold mb-2">
        Заказы
      </h2>
      <p class="text-zinc-400 mb-5">
        Здесь отображаются заказы, оформленные через корзину сайта.
      </p>

      <div id="ordersList" class="space-y-5"></div>
    </section>

  </main>

  <script>
    const API_URL = "http://localhost:3000";

    let products = [];
    let orders = [];

    const categoryNames = {
      rolls: "Роллы",
      fastfood: "Фастфуд",
      pizza: "Пицца",
      drinks: "Напитки"
    };

    async function loadAll() {
      await loadProducts();
      await loadOrders();
    }

    async function loadProducts() {
      try {
        const response = await fetch(`${API_URL}/products`);
        products = await response.json();
        renderProducts();
      } catch (error) {
        console.error(error);
        alert("Не удалось загрузить товары. Проверь сервер.");
      }
    }

    function renderProducts() {
      const list = document.getElementById("productsList");
      const filter = document.getElementById("filterCategory").value;

      list.innerHTML = "";

      let filtered = products;

      if (filter !== "all") {
        filtered = products.filter(product => product.category === filter);
      }

      if (!filtered.length) {
        list.innerHTML = `
          <p class="text-zinc-400">
            Товаров пока нет
          </p>
        `;
        return;
      }

      filtered.forEach(product => {
        const card = document.createElement("div");
        card.className = "bg-zinc-950 border border-zinc-800 rounded-2xl overflow-hidden";

        card.innerHTML = `
          <img
            src="${product.img || "https://images.unsplash.com/photo-1579584425555-c3ce17fd4351?q=80&w=800"}"
            class="w-full h-40 object-cover"
            alt="${product.name}"
          >

          <div class="p-4">
            <p class="text-red-500 text-sm mb-1">
              ${categoryNames[product.category] || product.category}
            </p>

            <h3 class="font-bold text-lg">
              ${product.name}
            </h3>

            <p class="text-zinc-400 mt-2 min-h-[48px]">
              ${product.description || "Описание не указано"}
            </p>

            <div class="flex justify-between items-center mt-4">
              <span class="text-red-500 font-bold">
                ${product.price} ₸
              </span>

              <button onclick="deleteProduct('${product._id}')" class="bg-zinc-800 hover:bg-red-700 px-4 py-2 rounded-xl">
                Удалить
              </button>
            </div>
          </div>
        `;

        list.appendChild(card);
      });
    }

    async function addProduct() {
      const name = document.getElementById("productName").value.trim();
      const category = document.getElementById("productCategory").value;
      const description = document.getElementById("productDescription").value.trim();
      const price = document.getElementById("productPrice").value;
      const img = document.getElementById("productImg").value.trim();

      if (!name || !category || !price) {
        alert("Заполни название, категорию и цену");
        return;
      }

      try {
        const response = await fetch(`${API_URL}/products`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name,
            category,
            description,
            price: Number(price),
            img
          })
        });

        if (!response.ok) {
          throw new Error("Ошибка добавления товара");
        }

        document.getElementById("productName").value = "";
        document.getElementById("productDescription").value = "";
        document.getElementById("productPrice").value = "";
        document.getElementById("productImg").value = "";

        await loadProducts();

        alert("Товар добавлен");
      } catch (error) {
        console.error(error);
        alert("Не удалось добавить товар");
      }
    }

    async function deleteProduct(id) {
      const ok = confirm("Удалить этот товар?");

      if (!ok) return;

      try {
        const response = await fetch(`${API_URL}/products/${id}`, {
          method: "DELETE"
        });

        if (!response.ok) {
          throw new Error("Ошибка удаления товара");
        }

        await loadProducts();
      } catch (error) {
        console.error(error);
        alert("Не удалось удалить товар");
      }
    }

    async function loadOrders() {
      try {
        const response = await fetch(`${API_URL}/orders`);
        orders = await response.json();
        renderOrders();
      } catch (error) {
        console.error(error);
        alert("Не удалось загрузить заказы. Проверь сервер.");
      }
    }

    function renderOrders() {
      const list = document.getElementById("ordersList");

      list.innerHTML = "";

      if (!orders.length) {
        list.innerHTML = `
          <p class="text-zinc-400">
            Заказов пока нет
          </p>
        `;
        return;
      }

      orders.forEach(order => {
        const createdAt = new Date(order.createdAt).toLocaleString("ru-RU");

        const itemsHtml = order.items.map(item => {
          return `
            <li class="text-zinc-300">
              ${item.name} — ${item.quantity} шт. × ${item.price} ₸
            </li>
          `;
        }).join("");

        const div = document.createElement("div");
        div.className = "bg-zinc-950 border border-zinc-800 rounded-2xl p-5";

        div.innerHTML = `
          <div class="flex flex-col lg:flex-row justify-between gap-4">
            <div>
              <h3 class="text-xl font-bold">
                Заказ от ${order.customer?.name || "Клиент"}
              </h3>

              <p class="text-zinc-400 mt-1">
                Телефон: ${order.customer?.phone || "не указан"}
              </p>

              <p class="text-zinc-400">
                Адрес: ${order.customer?.address || "не указан"}
              </p>

              <p class="text-zinc-500 mt-1">
                Дата: ${createdAt}
              </p>
            </div>

            <div class="text-left lg:text-right">
              <p class="text-red-500 font-bold text-xl">
                ${order.total} ₸
              </p>

              <p class="text-zinc-400">
                Статус: ${order.status || "Новый"}
              </p>
            </div>
          </div>

          <div class="mt-4">
            <p class="font-bold mb-2">Состав заказа:</p>
            <ul class="list-disc ml-5 space-y-1">
              ${itemsHtml}
            </ul>
          </div>

          <div class="flex flex-col md:flex-row gap-3 mt-5">
            <select
              onchange="updateOrderStatus('${order._id}', this.value)"
              class="bg-zinc-900 border border-zinc-700 px-4 py-2 rounded-xl outline-none"
            >
              <option ${order.status === "Новый" ? "selected" : ""}>Новый</option>
              <option ${order.status === "В обработке" ? "selected" : ""}>В обработке</option>
              <option ${order.status === "Готовится" ? "selected" : ""}>Готовится</option>
              <option ${order.status === "Завершён" ? "selected" : ""}>Завершён</option>
            </select>

            <button onclick="deleteOrder('${order._id}')" class="bg-zinc-800 hover:bg-red-700 px-4 py-2 rounded-xl">
              Удалить заказ
            </button>
          </div>
        `;

        list.appendChild(div);
      });
    }

    async function updateOrderStatus(id, status) {
      try {
        const response = await fetch(`${API_URL}/orders/${id}/status`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            status
          })
        });

        if (!response.ok) {
          throw new Error("Ошибка обновления статуса");
        }

        await loadOrders();
      } catch (error) {
        console.error(error);
        alert("Не удалось обновить статус заказа");
      }
    }

    async function deleteOrder(id) {
      const ok = confirm("Удалить этот заказ?");

      if (!ok) return;

      try {
        const response = await fetch(`${API_URL}/orders/${id}`, {
          method: "DELETE"
        });

        if (!response.ok) {
          throw new Error("Ошибка удаления заказа");
        }

        await loadOrders();
      } catch (error) {
        console.error(error);
        alert("Не удалось удалить заказ");
      }
    }

    loadAll();
  </script>

</body>
</html>
